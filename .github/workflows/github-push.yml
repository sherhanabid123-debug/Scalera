name: 🚀 GitHub Push Notifications

on:
  push:
    branches:
      - main
      - develop

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Push Notification to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -X POST "$DISCORD_WEBHOOK" \
          -H "Content-Type: application/json" \
          -d '{
            "username": "Scalera Development",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "embeds": [
              {
                "title": "🚀 New Push",
                "description": "A new commit has been pushed to the repository.",
                "color": 3447003,
                "thumbnail": {
                  "url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
                },
                "fields": [
                  {
                    "name": "📦 Repository",
                    "value": "${{ github.event.repository.name }}",
                    "inline": true
                  },
                  {
                    "name": "🌿 Branch",
                    "value": "${{ github.ref_name }}",
                    "inline": true
                  },
                  {
                    "name": "👤 Author",
                    "value": "${{ github.actor }}",
                    "inline": true
                  },
                  {
                    "name": "📝 Commit",
                    "value": "${{ github.event.head_commit.message }}",
                    "inline": false
                  },
                  {
                    "name": "🔗 Commit",
                    "value": "[View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})",
                    "inline": false
                  }
                ],
                "footer": {
                  "text": "Scalera • Development Pipeline"
                },
                "timestamp": "${{ github.event.head_commit.timestamp }}"
              }
            ]
          }'
