name: 🚀 GitHub Push Notifications

on:
  push:
    branches:
      - main
      - develop

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Push Notification
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.actor }}
          COMMIT: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          payload=$(jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg commit "$COMMIT" \
            --arg sha "$SHA" \
            --arg ts "$TIMESTAMP" \
            '{
              username: "Scalera Development",
              avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              embeds: [
                {
                  title: "🚀 New Push",
                  description: "A new commit has been pushed.",
                  color: 3447003,
                  fields: [
                    {
                      name: "📦 Repository",
                      value: $repo,
                      inline: true
                    },
                    {
                      name: "🌿 Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "👤 Author",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "📝 Commit",
                      value: $commit,
                      inline: false
                    },
                    {
                      name: "🔗 Commit",
                      value: ("https://github.com/" + $repo + "/commit/" + $sha),
                      inline: false
                    }
                  ],
                  footer: {
                    text: "Scalera • Development Pipeline"
                  },
                  timestamp: $ts
                }
              ]
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$payload" \
               "$WEBHOOK"
