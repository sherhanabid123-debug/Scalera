name: Scalera GitHub Notifications

on:
  push:
    branches:
      - main
      - develop

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"username\":\"Scalera Github\",
            \"embeds\":[{
              \"title\":\"🚀 New Push\",
              \"url\":\"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\",
              \"color\":5793266,
              \"fields\":[
                {
                  \"name\":\"📦 Repository\",
                  \"value\":\"\`${{ github.event.repository.name }}\`\",
                  \"inline\":true
                },
                {
                  \"name\":\"🌿 Branch\",
                  \"value\":\"\`${{ github.ref_name }}\`\",
                  \"inline\":true
                },
                {
                  \"name\":\"👤 Author\",
                  \"value\":\"${{ github.actor }}\",
                  \"inline\":true
                },
                {
                  \"name\":\"📝 Commit Message\",
                  \"value\":\"${{ github.event.head_commit.message }}\",
                  \"inline\":false
                },
                {
                  \"name\":\"🔗 Commit\",
                  \"value\":\"[View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})\",
                  \"inline\":false
                }
              ],
              \"footer\":{
                \"text\":\"Scalera Development Pipeline\"
              },
              \"timestamp\":\"${{ github.event.head_commit.timestamp }}\"
            }]
          }" \
          "$DISCORD_WEBHOOK"
