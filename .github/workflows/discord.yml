name: Discord Notifications

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\":\"🚀 New push to **${{ github.repository }}**\n👤 Author: ${{ github.actor }}\n📝 Commit: ${{ github.event.head_commit.message }}\"}" \
          "$DISCORD_WEBHOOK"
